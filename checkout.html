    <main class="checkout-page" style="padding-top: 8rem">

    <script src="script.js"></script>
    <script>
      // عرض الطلب الحالي
      function renderOrderSummary() {
        const container = document.getElementById("orderSummaryContainer");
        const cart = JSON.parse(localStorage.getItem("FAKHAMAHCart")) || [];

        if (cart.length === 0) {
          container.innerHTML = `
                    <div style="text-align:center; padding:3rem; background:var(--glass-bg); border-radius:var(--radius-lg);">
                        <i class="fa-solid fa-bag-shopping" style="font-size:3rem; color:var(--text-muted);"></i>
                        <p style="color:var(--text-muted); margin-top:1rem;">Your cart is empty.</p>
                        <a href="shop.html" class="btn btn-gold" style="margin-top:1rem;">Continue Shopping</a>
                    </div>`;
          return;
        }

        let total = cart.reduce(
          (sum, item) => sum + item.price * item.quantity,
          0,
        );
        let itemsHTML = cart
          .map(
            (item) => `
                <div class="cart-item" style="display:flex; justify-content:space-between; align-items:center; padding:1rem 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                    <div>
                        <strong>${item.name}</strong>
                        <span style="color:var(--text-muted); margin-left:1rem;">x${item.quantity}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:2rem;">
                        <span style="color:var(--gold);">${item.price * item.quantity} EGP</span>
                        <button class="remove-item-btn" data-id="${item.id}" style="background:none; border:none; color:#c0392b; cursor:pointer;">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `,
          )
          .join("");

        container.innerHTML = `
                <div class="cart-summary" style="background:var(--glass-bg); border-radius:var(--radius-lg); padding:2rem; margin-bottom:2rem;">
                    <h3 style="color:var(--gold); margin-bottom:1.5rem;">Order Summary</h3>
                    ${itemsHTML}
                    <div style="display:flex; justify-content:space-between; margin-top:1.5rem; font-weight:bold; font-size:1.2rem;">
                        <span>Total</span>
                        <span style="color:var(--gold);">${total} EGP</span>
                    </div>
                    <button id="proceedToFormBtn" class="btn btn-gold" style="width:100%; margin-top:2rem;">
                        Proceed to Checkout <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            `;

        // حذف عنصر من السلة
        document.querySelectorAll(".remove-item-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const itemId = parseInt(btn.dataset.id);
            let cart = JSON.parse(localStorage.getItem("FAKHAMAHCart")) || [];
            cart = cart.filter((item) => item.id !== itemId);
            localStorage.setItem("FAKHAMAHCart", JSON.stringify(cart));
            updateCartCount();
            renderOrderSummary(); // إعادة عرض الصفحة
          });
        });

        // زر المتابعة إلى النموذج
        document
          .getElementById("proceedToFormBtn")
          .addEventListener("click", () => {
            window.location.href = "checkout-form.html";
          });
      }

      function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem("FAKHAMAHCart")) || [];
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        const countEl = document.getElementById("cartCount");
        if (countEl) countEl.textContent = count;
      }

      renderOrderSummary();
      updateCartCount();
    </script>
