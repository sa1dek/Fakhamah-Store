    <!-- ========================= -->
    <!-- CONTACT PAGE CONTENT      -->
    <!-- ========================= -->
    <main style="padding: 8rem 2rem 4rem; max-width: 600px; margin: 0 auto">
      <div class="section-header reveal">
        <span class="section-tag">Get In Touch</span>
        <h2 class="section-title">Contact Us</h2>
        <div class="section-line"></div>
      </div>

      <form
        id="contactForm"
        class="checkout-form"
        style="
          background: var(--glass-bg);
          border-radius: var(--radius-lg);
          padding: 2.5rem;
        "
      >
        <div style="margin-bottom: 1rem">
          <label
            style="
              display: block;
              margin-bottom: 0.5rem;
              color: var(--text-secondary);
            "
          >
            Full Name *
          </label>
          <input
            type="text"
            id="contactName"
            placeholder="Enter your full name"
            required
            style="width: 100%"
          />
        </div>

        <div style="margin-bottom: 1rem">
          <label
            style="
              display: block;
              margin-bottom: 0.5rem;
              color: var(--text-secondary);
            "
          >
            WhatsApp Number *
          </label>
          <input
            type="tel"
            id="contactPhone"
            placeholder="+20 1XX XXXX XXXX"
            required
            style="width: 100%"
          />
          <small style="color: var(--text-muted)"
            >We'll reply via WhatsApp</small
          >
        </div>

        <div style="margin-bottom: 1.5rem">
          <label
            style="
              display: block;
              margin-bottom: 0.5rem;
              color: var(--text-secondary);
            "
          >
            Your Message *
          </label>
          <textarea
            id="contactMessage"
            rows="4"
            placeholder="Write your inquiry..."
            required
            style="width: 100%"
          ></textarea>
        </div>

        <button type="submit" class="btn btn-gold" style="width: 100%">
          <i class="fa-brands fa-whatsapp"></i> Send via WhatsApp
        </button>

        <p
          id="contactSuccess"
          style="color: #27ae60; margin-top: 1rem; display: none"
        >
          ✓ Message sent! Redirecting to WhatsApp...
        </p>
      </form>
    </main>

    <!-- ========================= -->
    <!-- FOOTER                    -->
    <!-- ========================= -->
    <footer class="footer" style="margin-top: 3rem">
      <div class="footer-bottom">
        <p>&copy; 2026 FAKHAMAH. All rights reserved.</p>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
      document
        .getElementById("contactForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const name = document.getElementById("contactName").value.trim();
          const phone = document.getElementById("contactPhone").value.trim();
          const message = document
            .getElementById("contactMessage")
            .value.trim();

          if (!name || !phone || !message) {
            alert("Please fill in all required fields.");
            return;
          }

          const businessWhatsApp = "201068480441";
          const text = `Hello FAKHAMAH,%0A%0A*Name:* ${encodeURIComponent(name)}%0A*Phone:* ${encodeURIComponent(phone)}%0A*Message:* ${encodeURIComponent(message)}`;

          const successMsg = document.getElementById("contactSuccess");
          successMsg.style.display = "block";
          setTimeout(() => {
            window.open(
              `https://wa.me/${businessWhatsApp}?text=${text}`,
              "_blank",
            );
            successMsg.style.display = "none";
            this.reset();
          }, 1500);
        });
    </script>
